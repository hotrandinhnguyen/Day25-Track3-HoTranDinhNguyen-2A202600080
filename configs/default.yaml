cache:
  backend: memory
  enabled: true
  redis_url: redis://localhost:6379/0
  similarity_threshold: 0.92
  ttl_seconds: 300
circuit_breaker:
  failure_threshold: 3
  reset_timeout_seconds: 2
  success_threshold: 1
load_test:
  concurrency: 10
  requests: 200
providers:
- base_latency_ms: 180
  cost_per_1k_tokens: 0.01
  fail_rate: 0.25
  name: primary
- base_latency_ms: 260
  cost_per_1k_tokens: 0.006
  fail_rate: 0.05
  name: backup
scenarios:
- description: "Primary provider fails 100% \xE2\u20AC\u201D all traffic should fallback"
  name: primary_timeout_100
  provider_overrides:
    primary: 1.0
- description: "Primary provider fails 50% \xE2\u20AC\u201D circuit should oscillate"
  name: primary_flaky_50
  provider_overrides:
    primary: 0.5
- description: "Baseline \xE2\u20AC\u201D both providers healthy, fail_rate forced\
    \ to 0"
  name: all_healthy
  provider_overrides:
    backup: 0.0
    primary: 0.0
- description: "Both providers at 40% fail rate \xE2\u20AC\u201D tests static fallback\
    \ path"
  name: both_degraded
  provider_overrides:
    backup: 0.4
    primary: 0.4
- description: "Primary fully down, backup healthy \xE2\u20AC\u201D measures pure\
    \ fallback throughput"
  name: backup_only_healthy
  provider_overrides:
    backup: 0.0
    primary: 1.0
